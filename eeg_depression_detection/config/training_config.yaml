# Training Configuration
# Optimized for <8GB VRAM

# Optimizer
optimizer:
  name: "AdamW"
  lr: 0.0001
  weight_decay: 0.01
  betas: [0.9, 0.999]

# Learning Rate Scheduler
scheduler:
  name: "CosineAnnealingWarmRestarts"
  T_0: 10
  T_mult: 2
  eta_min: 0.000001

# Training
training:
  epochs: 100
  batch_size: 16
  gradient_accumulation_steps: 2  # Effective batch size = 32
  gradient_clip: 1.0
  early_stopping_patience: 15
  early_stopping_delta: 0.001

# Memory Optimization
memory:
  mixed_precision: true           # FP16 training
  gradient_checkpointing: true    # Trade compute for memory
  pin_memory: true
  num_workers: 4
  prefetch_factor: 2

# Loss Function
loss:
  name: "BCEWithLogitsLoss"
  label_smoothing: 0.1
  class_weight: "balanced"       # Compute from training data

# Data Augmentation
augmentation:
  enabled: true
  time_shift_ratio: 0.1          # Max 10% shift
  time_warp_sigma: 0.2
  channel_dropout_prob: 0.1
  noise_snr_db: 20

# Cross-Validation
cross_validation:
  strategy: "loso"               # Leave-One-Subject-Out
  n_splits: 5                    # For stratified k-fold fallback
  shuffle: true
  random_state: 42

# Checkpointing
checkpointing:
  save_best: true
  save_last: true
  save_every_n_epochs: 10
  checkpoint_dir: "checkpoints"

# Logging
logging:
  log_every_n_steps: 10
  log_dir: "logs"
  use_wandb: false               # Set to true if using Weights & Biases
